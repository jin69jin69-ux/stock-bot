name: Stock Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '50 23 * * *'
    - cron: '30 03 * * *'
    - cron: '20 06 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock bot
        run: python bot.py
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
