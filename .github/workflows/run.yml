name: Stock Bot

on:
  schedule:
    - cron: '50 23 * * *' # 朝 8:50（日本時間）
    - cron: '30 03 * * *' # 昼 12:30
    - cron: '20 06 * * *' # 引け後 15:20
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python bot.py
